baseURL = 'https://cleanunicorn.github.io/'
languageCode = 'en-us'
theme = "terminal"
pagination.pagerSize = 5

[markup.goldmark.renderer]
  unsafe = true
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        inline = [['$', '$']]
        block = [['$$', '$$']]

[markup.highlight]
  noClasses = false

[params]
  contentTypeName = "about"
  showMenuItems = 4
  fullWidthTheme = false
  centerTheme = true
  autoCover = true
  # Optional lede for the custom 404 page (layouts/404.html). Falls back to a
  # built-in message when unset.
  # missingContentMessage = "The page you're looking for isn't on this chain."

[languages]
  [languages.en]
    title = "Daniel Luca"
    languageName = "English"

    [languages.en.params]
      subtitle = "Security Researcher | Investor | Builder"
      owner = "Daniel Luca"
      author = "Daniel Luca"
      menuMore = "Show more"
      keywords = "Daniel Luca, CleanUnicorn, smart contract audit, Ethereum security, blockchain security researcher, EVM, Solidity, DeFi, venture capital, decentralized AI"

      # Schema.org Person metadata — consumed by partials/structured_data.html.
      alternateName = "CleanUnicorn"
      jobTitle = "Security Researcher & Investor"
      personDescription = "Ethereum security auditor, investor and builder working in blockchain since 2017; Technical Partner at Eden Block."
      sameAs = [
        "https://x.com/cleanunicorn",
        "https://www.linkedin.com/in/luca-daniel-5227267/",
        "https://github.com/cleanunicorn",
        "https://www.imdb.com/title/tt35931420/",
      ]
      knowsAbout = [
        "Smart Contract Security", "Ethereum", "Solidity", "EVM Internals",
        "DeFi", "Blockchain Security", "Venture Capital", "Decentralized AI",
      ]

      [languages.en.params.twitter]
        site = "@cleanunicorn"
        creator = "@cleanunicorn"

      [languages.en.params.logo]
        logoText = "Daniel Luca"
        logoHomeLink = "/"

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "about"
        name = "About"
        url = "/about/"
        weight = 10
      [[languages.en.menu.main]]
        identifier = "work"
        name = "Work"
        url = "/work/"
        weight = 20
      [[languages.en.menu.main]]
        identifier = "posts"
        name = "Posts"
        url = "/posts/"
        weight = 30
      [[languages.en.menu.main]]
        identifier = "contact"
        name = "Contact"
        url = "/contact/"
        weight = 40
